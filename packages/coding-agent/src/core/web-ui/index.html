<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Me Write Code Web</title>
		<link rel="stylesheet" href="/web/app.css" />
	</head>
	<body>
		<div class="shell">
			<header>
				<div>
					<strong>Me Write Code</strong>
					<span id="status">connecting…</span>
				</div>
				<div id="cwd" title="Current working directory">cwd: …</div>
				<div class="session-controls">
					<select id="sessions" aria-label="Session"></select>
					<button id="new-session" type="button">New</button>
					<button id="manage-sessions" type="button">Manage</button>
					<div id="session">no session</div>
				</div>
			</header>
			<div id="banner" class="banner hidden"></div>
			<main id="layout">
				<aside class="pane files">
					<div class="pane-title">
						<h2>Files</h2>
						<button class="pane-toggle" type="button" data-pane="files" title="Collapse files">‹</button>
					</div>
					<div id="file-tree" class="file-tree">loading…</div>
				</aside>
				<div class="resizer" data-side="files" role="separator" aria-orientation="vertical" aria-label="Resize files pane" tabindex="0"></div>
				<section class="pane editor">
					<div class="pane-title editor-title-row">
						<h2 id="editor-title">Editor</h2>
						<div class="editor-actions">
							<span id="dirty" class="dirty hidden">unsaved</span>
							<button id="save" type="button" disabled>Save</button>
						</div>
					</div>
					<textarea id="editor" spellcheck="false" disabled>Select a file from the tree.</textarea>
				</section>
				<div class="resizer" data-side="chat" role="separator" aria-orientation="vertical" aria-label="Resize chat pane" tabindex="0"></div>
				<section class="pane chat">
					<div class="pane-title">
						<h2>Agent Chat</h2>
						<button class="pane-toggle" type="button" data-pane="chat" title="Collapse chat">›</button>
					</div>
					<div id="messages" class="messages"></div>
					<div id="thinking" class="thinking hidden" aria-live="polite">Agent is thinking<span></span></div>
					<form id="composer">
						<textarea id="prompt" rows="3" placeholder="Ask Me Write Code…"></textarea>
						<button id="send" type="submit">Send</button>
					</form>
				</section>
			</main>
			<div id="toasts" class="toasts" role="status" aria-live="polite"></div>
			<dialog id="sessions-manager" class="sessions-manager">
				<form method="dialog" class="sessions-manager-form">
					<h2>Sessions</h2>
					<div id="sessions-manager-error" class="sessions-manager-error hidden"></div>
					<div id="sessions-manager-list" class="sessions-manager-list" role="list" aria-label="Sessions">loading…</div>
					<div class="sessions-manager-actions">
						<button id="sessions-manager-close" type="button">Close</button>
					</div>
				</form>
			</dialog>
			<dialog id="folder-picker" class="folder-picker">
				<form method="dialog" class="folder-picker-form">
					<h2>Choose session folder</h2>
					<div class="folder-picker-path">
						<label for="folder-picker-input">Path</label>
						<input id="folder-picker-input" type="text" spellcheck="false" autocomplete="off" />
						<button id="folder-picker-go" type="button">Go</button>
					</div>
					<div id="folder-picker-error" class="folder-picker-error hidden"></div>
					<div id="folder-picker-list" class="folder-picker-list" role="listbox" aria-label="Directories">loading…</div>
					<div class="folder-picker-actions">
						<button id="folder-picker-cancel" type="button">Cancel</button>
						<button id="folder-picker-select" type="button">Use this folder</button>
					</div>
				</form>
			</dialog>
		</div>
		<script type="module" src="/web/app.js"></script>
	</body>
</html>
