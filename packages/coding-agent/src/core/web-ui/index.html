<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Me Write Code Web</title>
		<link rel="stylesheet" href="/web/app.css" />
	</head>
	<body>
		<div class="shell">
			<header>
				<div>
					<strong>Me Write Code</strong>
					<span id="status">connecting…</span>
				</div>
				<div id="cwd" title="Current working directory">cwd: …</div>
				<div id="session">no session</div>
			</header>
			<div id="banner" class="banner hidden"></div>
			<main id="layout">
				<aside class="pane files">
					<div class="pane-title">
						<h2>Files</h2>
						<button class="pane-toggle" type="button" data-pane="files" title="Collapse files">‹</button>
					</div>
					<div id="file-tree" class="file-tree">loading…</div>
				</aside>
				<section class="pane editor">
					<div class="pane-title editor-title-row">
						<h2 id="editor-title">Editor</h2>
						<div class="editor-actions">
							<span id="dirty" class="dirty hidden">unsaved</span>
							<button id="save" type="button" disabled>Save</button>
						</div>
					</div>
					<textarea id="editor" spellcheck="false" disabled>Select a file from the tree.</textarea>
				</section>
				<section class="pane chat">
					<div class="pane-title">
						<h2>Agent Chat</h2>
						<button class="pane-toggle" type="button" data-pane="chat" title="Collapse chat">›</button>
					</div>
					<div id="messages" class="messages"></div>
					<div id="thinking" class="thinking hidden" aria-live="polite">Agent is thinking<span></span></div>
					<form id="composer">
						<textarea id="prompt" rows="3" placeholder="Ask Me Write Code…"></textarea>
						<button id="send" type="submit">Send</button>
					</form>
				</section>
			</main>
		</div>
		<script type="module" src="/web/app.js"></script>
	</body>
</html>
