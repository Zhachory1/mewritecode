openapi: 3.0.3
info:
  title: Cave Daemon API
  version: 0.1.0
  description: |
    HTTP + WebSocket API for the cave daemon (`cave serve`). Multi-client
    attach for headless coding agent sessions. Sessions are persisted in
    SQLite (`~/.cave/daemon/sessions.db`) and survive process restarts and
    SSH drops.

    Provenance: opencode (sst/opencode, MIT) inspired the daemon-with-attach
    pattern; Codex app-server (Apache-2.0) inspired JSON-RPC over WebSocket
    for low-latency token streaming. No upstream equivalent was
    found — built from scratch in Me Write Code.
servers:
  - url: http://127.0.0.1:7421
    description: Local daemon (default)
security:
  - bearerAuth: []
paths:
  /v1/health:
    get:
      summary: Liveness probe
      operationId: health
      security: []
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /v1/sessions:
    get:
      summary: List sessions
      operationId: listSessions
      parameters:
        - in: query
          name: state
          required: false
          schema:
            $ref: "#/components/schemas/SessionState"
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: list
          content:
            application/json:
              schema:
                type: object
                required: [sessions]
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/SessionSummary"
    post:
      summary: Create a new session
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
  /v1/sessions/{id}:
    get:
      summary: Get session by id
      operationId: getSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete session
      operationId: deleteSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "204":
          description: deleted
  /v1/sessions/{id}/messages:
    post:
      summary: Send a user message into a session (queue for processing)
      operationId: sendMessage
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "202":
          description: queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/sessions/{id}/transcript:
    get:
      summary: Get full transcript (text snapshot, not the raw model messages)
      operationId: getTranscript
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transcript"
  /v1/sessions/{id}/files/tree:
    get:
      summary: List read-only file entries under the session cwd
      operationId: listSessionFiles
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - in: query
          name: path
          required: false
          schema:
            type: string
            default: ""
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileTree"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          description: directory too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/sessions/{id}/files/read:
    get:
      summary: Read a small UTF-8 file under the session cwd
      operationId: readSessionFile
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - in: query
          name: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadFile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          description: file too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "415":
          description: binary file unsupported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/sessions/{id}/files/write:
    put:
      summary: Write a small UTF-8 file under the session cwd
      operationId: writeSessionFile
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WriteFileRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WriteFile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: file changed on disk
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: file too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "415":
          description: binary file unsupported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/sessions/{id}/skills:
    get:
      summary: List skills available to this session (built-in + user + project)
      operationId: listSessionSkills
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillList"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/fs/list:
    get:
      summary: List directories at an absolute path (folder picker for new sessions)
      operationId: listFilesystem
      parameters:
        - in: query
          name: path
          required: false
          description: Absolute path to list. Defaults to the user's home directory.
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FsList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          description: directory too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/workers:
    get:
      summary: List registered remote workers (for `&prompt` handoff)
      operationId: listWorkers
      responses:
        "200":
          description: list
          content:
            application/json:
              schema:
                type: object
                required: [workers]
                properties:
                  workers:
                    type: array
                    items:
                      $ref: "#/components/schemas/Worker"
    post:
      summary: Register a remote cave worker
      operationId: registerWorker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterWorkerRequest"
      responses:
        "201":
          description: registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Worker"
  /v1/workers/{name}:
    delete:
      summary: Unregister a worker
      operationId: removeWorker
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        "204":
          description: removed
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  parameters:
    SessionId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Health:
      type: object
      required: [ok, version, uptimeSec, capabilities]
      properties:
        ok:
          type: boolean
        version:
          type: string
        uptimeSec:
          type: integer
        capabilities:
          type: object
          required: [runnerKind, approvalSupported]
          properties:
            runnerKind:
              type: string
              enum: [echo, agent]
            approvalSupported:
              type: boolean
    SessionState:
      type: string
      enum: [idle, running, stopped, error]
    Session:
      type: object
      required: [id, createdAt, updatedAt, state, cwd]
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        state:
          $ref: "#/components/schemas/SessionState"
        cwd:
          type: string
        title:
          type: string
        model:
          type: string
        worker:
          type: string
          description: |
            If non-empty, this session was dispatched to a remote worker via
            the `&prompt` cloud-handoff syntax.
    SessionSummary:
      type: object
      required: [id, createdAt, updatedAt, state]
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        state:
          $ref: "#/components/schemas/SessionState"
        title:
          type: string
        worker:
          type: string
    CreateSessionRequest:
      type: object
      properties:
        cwd:
          type: string
        title:
          type: string
        model:
          type: string
        worker:
          type: string
          description: optional worker name to dispatch this session to
    SendMessageRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
        worker:
          type: string
    MessageEnvelope:
      type: object
      required: [id, sessionId, role, text, createdAt]
      properties:
        id:
          type: string
        sessionId:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant, system, tool]
        text:
          type: string
        createdAt:
          type: string
          format: date-time
    Transcript:
      type: object
      required: [sessionId, messages]
      properties:
        sessionId:
          type: string
          format: uuid
        messages:
          type: array
          items:
            $ref: "#/components/schemas/MessageEnvelope"
    FileTree:
      type: object
      required: [sessionId, path, entries]
      properties:
        sessionId:
          type: string
          format: uuid
        path:
          type: string
        entries:
          type: array
          items:
            $ref: "#/components/schemas/FileTreeEntry"
    FileTreeEntry:
      type: object
      required: [name, path, type]
      properties:
        name:
          type: string
        path:
          type: string
        type:
          type: string
          enum: [file, directory]
        size:
          type: integer
    FsList:
      type: object
      required: [path, entries]
      properties:
        path:
          type: string
          description: The resolved absolute path being listed.
        parent:
          type: string
          nullable: true
          description: Absolute path of the parent directory, or null at the filesystem root.
        home:
          type: string
          description: The user's home directory (client hint).
        entries:
          type: array
          items:
            $ref: "#/components/schemas/FileTreeEntry"
    ReadFile:
      type: object
      required: [sessionId, path, text, size, mtimeMs, encoding]
      properties:
        sessionId:
          type: string
          format: uuid
        path:
          type: string
        text:
          type: string
        size:
          type: integer
        mtimeMs:
          type: number
        encoding:
          type: string
          enum: [utf8]
    WriteFileRequest:
      type: object
      required: [path, text, expectedMtimeMs, expectedSize]
      properties:
        path:
          type: string
        text:
          type: string
        expectedMtimeMs:
          type: number
        expectedSize:
          type: integer
    WriteFile:
      type: object
      required: [sessionId, path, size, mtimeMs, encoding]
      properties:
        sessionId:
          type: string
          format: uuid
        path:
          type: string
        size:
          type: integer
        mtimeMs:
          type: number
        encoding:
          type: string
          enum: [utf8]
    SkillList:
      type: object
      required: [sessionId, skills]
      properties:
        sessionId:
          type: string
          format: uuid
        skills:
          type: array
          items:
            $ref: "#/components/schemas/SkillSummary"
    SkillSummary:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
        description:
          type: string
    Worker:
      type: object
      required: [name, url, registeredAt]
      properties:
        name:
          type: string
        url:
          type: string
          format: uri
        registeredAt:
          type: string
          format: date-time
        lastSeenAt:
          type: string
          format: date-time
        labels:
          type: object
          additionalProperties:
            type: string
    RegisterWorkerRequest:
      type: object
      required: [name, url]
      properties:
        name:
          type: string
        url:
          type: string
          format: uri
        token:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
# WebSocket endpoint (out-of-band of OpenAPI; documented for SDK):
#   ws://127.0.0.1:<port>/v1/sessions/{id}/stream
# JSON-RPC 2.0 framed messages:
#   notifications: { method: "token", params: { sessionId, text, role } }
#                  { method: "tool", params: { sessionId, name, status } }
#                  { method: "state", params: { sessionId, state } }
#                  { method: "approval", params: { sessionId, approvalId, toolName, args, tier } }
#                  { method: "file", params: { sessionId, path, at } }
#                  { method: "done",  params: { sessionId } }
#   requests:      { method: "client_capabilities", params: { approval } } → { result: { ok: true } }
#                  { method: "send", params: { text } } → { result: { id } }
#                  { method: "interrupt", params: {} } → { result: { ok: true } }
#                  { method: "approval_decision", params: { approvalId, decision } } → { result: { ok: true } }
