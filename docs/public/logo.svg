    />

    <path d="M 76 93 C 100 90, 130 91, 158 95" stroke="#241F1C" stroke-width="2.4" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M 72 104 C 102 109, 134 108, 165 104" stroke="#241F1C" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.65"/>
    <path d="M 96 86 C 101 96, 101 106, 96 116" stroke="#8E6B46" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8"/>
    <path d="M 119 85 C 125 96, 125 106, 120 116" stroke="#8E6B46" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.75"/>
    <path d="M 144 87 C 149 96, 148 105, 143 113" stroke="#8E6B46" stroke-width="2.6" stroke-linecap="round" fill="none" opacity="0.65"/>

    <path
