    <path d="M 58 88 L 40 99" stroke="#A99575" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M 58 112 L 41 103" stroke="#A99575" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M 68 100 L 32 100" stroke="#B8AA8E" stroke-width="1.5" stroke-linecap="round"/>

    <path
      d="M 15 100
         L 32 93
         L 32 107
         Z"
