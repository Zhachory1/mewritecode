    <circle cx="13" cy="100" r="3" fill="#FF6B35"/>
    <circle cx="6" cy="94" r="1.4" fill="#FF6B35" opacity="0.8"/>
    <circle cx="8" cy="108" r="1.8" fill="#FF6B35" opacity="0.8"/>
