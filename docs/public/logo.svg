<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%" role="img" aria-label="Me Write Code stick pencil logo">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-opacity="0.35" flood-color="#000000"/>
    </filter>

    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5A4634"/>
      <stop offset="45%" stop-color="#7A5A3E"/>
      <stop offset="100%" stop-color="#3F332A"/>
    </linearGradient>

    <linearGradient id="sharpened" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0E7D6"/>
      <stop offset="70%" stop-color="#CDBF9D"/>
      <stop offset="100%" stop-color="#8F7757"/>
    </linearGradient>
  </defs>

  <g transform="rotate(-35 100 100)" filter="url(#shadow)">
    <path
