name: mewrite-code
base: core24
version: git
summary: Me Write Code terminal coding agent
description: |
  Me Write Code is a terminal coding harness that stays provider-agnostic,
  terminal-native, and deeply extensible. Use it interactively, run it in
  print or JSON mode, embed it through the SDK, or extend it with TypeScript
  modules, skills, prompt templates, themes, and workflows.

grade: stable
confinement: classic

architectures:
  - build-on: amd64

apps:
  mewrite-code:
    command: mewrite
  mewrite:
    command: mewrite
  mewritecode:
    command: mewrite

parts:
  mewrite:
    plugin: dump
    source: https://github.com/Zhachory1/mewritecode/releases/latest/download/mewrite-linux-x64.tar.gz
    source-type: tar
    organize:
      mewrite/*: ./
