name: bench-nightly
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      instance_count:
        description: "Number of instances to run"
        required: false
        default: "50"

permissions:
  contents: write

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      CAVE_BENCH_INSTANCE_CAP_DOLLARS: "5"
      CAVE_BENCH_INSTANCE_COUNT: ${{ inputs.instance_count || '50' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      # Build all workspaces so @zhachory1/mewrite-* dist/ exists — the bench
      # imports them via package `exports` (dist paths), not src (issue #28).
      - run: npm run build
      - run: npm run bench:nightly
      - name: Commit results
        run: |
          # main is branch-protected (PR + required checks); a bot cannot push
          # to it. Nightly results are data, so persist them on a dedicated
          # unprotected branch instead.
          git config user.name "cave-bot"
          git config user.email "bot@cave.local"
          DATE=$(date -u +%Y-%m-%d)
          REL="research/results/nightly/${DATE}.json"
          if [ ! -f "${REL}" ]; then
            echo "no results produced"
            exit 0
          fi
          # Copy the result aside, switch to the results branch, restore it.
          TMP="$(mktemp)"
          cp "${REL}" "${TMP}"
          git fetch origin bench-results || true
          if git show-ref --verify --quiet refs/remotes/origin/bench-results; then
            git checkout -B bench-results origin/bench-results
          else
            git checkout --orphan bench-results
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p "$(dirname "${REL}")"
          cp "${TMP}" "${REL}"
          git add "${REL}"
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "bench(nightly): ${DATE}"
          git push origin HEAD:bench-results
