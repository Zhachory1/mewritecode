name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.12.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.2.20

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Build binaries
        run: ./scripts/build-binaries.sh

      - name: Install Linux package repo tooling
        run: sudo apt-get update && sudo apt-get install -y rpm dpkg-dev createrepo-c

      - name: Build Linux packages
        run: ./scripts/build-linux-packages.sh "${RELEASE_TAG}" packages/coding-agent/binaries

      - name: Build APT and Yum repositories
        run: ./scripts/build-linux-repos.sh packages/coding-agent/binaries packages/coding-agent/binaries/package-repos

      - name: Generate SHA256SUMS for release artifacts
        # WS11: installers/install.sh verifies tarball checksums against this
        # file. Generated from inside the binaries dir so paths are flat.
        run: |
          cd packages/coding-agent/binaries
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum mewrite-*.tar.gz mewrite-*.zip mewrite-code_*.deb mewrite-code-*.rpm > SHA256SUMS
          else
            shasum -a 256 mewrite-*.tar.gz mewrite-*.zip mewrite-code_*.deb mewrite-code-*.rpm > SHA256SUMS
          fi
          cat SHA256SUMS

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${RELEASE_TAG#v}"
          cd packages/coding-agent
          awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release ${VERSION}" > /tmp/release-notes.md
          fi

      - name: Create GitHub Release and upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/coding-agent/binaries
          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --notes-file /tmp/release-notes.md \
            mewrite-darwin-arm64.tar.gz \
            mewrite-darwin-x64.tar.gz \
            mewrite-linux-x64.tar.gz \
            mewrite-linux-arm64.tar.gz \
            mewrite-windows-x64.zip \
            mewrite-code_*.deb \
            mewrite-code-*.rpm \
            SHA256SUMS \
            2>/dev/null || \
          gh release upload "${RELEASE_TAG}" \
            mewrite-darwin-arm64.tar.gz \
            mewrite-darwin-x64.tar.gz \
            mewrite-linux-x64.tar.gz \
            mewrite-linux-arm64.tar.gz \
            mewrite-windows-x64.zip \
            mewrite-code_*.deb \
            mewrite-code-*.rpm \
            SHA256SUMS \
            --clobber

      - name: Upload artifacts for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: mewrite-archives
          path: |
            packages/coding-agent/binaries/mewrite-darwin-arm64.tar.gz
            packages/coding-agent/binaries/mewrite-darwin-x64.tar.gz
            packages/coding-agent/binaries/mewrite-linux-x64.tar.gz
            packages/coding-agent/binaries/mewrite-linux-arm64.tar.gz
            packages/coding-agent/binaries/mewrite-windows-x64.zip
            packages/coding-agent/binaries/mewrite-code_*.deb
            packages/coding-agent/binaries/mewrite-code-*.rpm
          retention-days: 7

      - name: Upload Linux package repositories
        uses: actions/upload-artifact@v4
        with:
          name: mewrite-package-repos
          path: packages/coding-agent/binaries/package-repos
          retention-days: 7

  publish-npm:
    runs-on: ubuntu-latest
    needs: build
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - name: Publish to npm
        id: publish
        run: npm publish --workspaces --access public
        if: env.NODE_AUTH_TOKEN != ''
        continue-on-error: true
      - name: Record npm publish status
        if: always()
        run: |
          mkdir -p publish-status
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "skipped" > publish-status/npm.txt
            echo "NPM_TOKEN not configured" > publish-status/npm-note.txt
          else
            echo "${{ steps.publish.outcome }}" > publish-status/npm.txt
            echo "npm publish step outcome: ${{ steps.publish.outcome }}" > publish-status/npm-note.txt
          fi
      - name: Upload npm publish status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-status-npm
          path: publish-status
          retention-days: 30

  publish-docker:
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Download mewrite-archives
        uses: actions/download-artifact@v4
        with:
          name: mewrite-archives
          path: archives
      - name: Extract linux-x64 tarball into docker-rootfs/
        run: |
          mkdir -p docker-rootfs
          tar -xzf archives/mewrite-linux-x64.tar.gz --strip-components=1 -C docker-rootfs
          test -x docker-rootfs/mewrite
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}
            ${{ env.IMAGE_NAME }}:latest

  publish-linux-repos:
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.HOMEBREW_BUMP_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Prepare gh-pages branch
        run: |
          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi
      - name: Download package repositories
        uses: actions/download-artifact@v4
        with:
          name: mewrite-package-repos
          path: package-repos
      - name: Publish APT and Yum repositories
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          rm -rf apt yum
          cp -R package-repos/apt package-repos/yum .
          touch .nojekyll
          git add apt yum .nojekyll
          if git diff --cached --quiet; then
            echo "Linux package repos unchanged — nothing to commit"
            exit 0
          fi
          git commit -m "chore(packages): publish ${RELEASE_TAG}"
          git push origin HEAD:gh-pages

  update-homebrew:
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # HOMEBREW_BUMP_TOKEN is an optional PAT; falls back to GITHUB_TOKEN.
          # main is branch-protected, so the formula lands via a PR (below), not
          # a direct push. The PAT lets that PR run the required check and
          # auto-merge; see the "Open formula bump PR" step for the caveats.
          token: ${{ secrets.HOMEBREW_BUMP_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Download mewrite-archives
        uses: actions/download-artifact@v4
        with:
          name: mewrite-archives
          path: archives
      - name: Rewrite Homebrew formula
        run: ./scripts/update-homebrew.sh "${RELEASE_TAG}" archives
      - name: Open formula bump PR
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_BUMP_TOKEN || secrets.GITHUB_TOKEN }}
          # A PR opened with the default GITHUB_TOKEN does NOT trigger the
          # required build-check-test workflow, so it cannot be merged. Set
          # HOMEBREW_BUMP_TOKEN (a PAT) to make CI run and enable auto-merge.
          #
          # Auto-merge additionally requires, on the repo/main ruleset:
          #   1. "Allow auto-merge" enabled (Settings > General > Pull Requests).
          #   2. The pull_request rule requires 1 approving review, so this PR
          #      will WAIT for a human approval before auto-merge lands it,
          #      unless the PAT's identity is added as a bypass actor for that
          #      rule (which weakens main protection — do this deliberately).
          # Without the PAT, the PR is still opened but must be merged manually.
          HAS_PAT: ${{ secrets.HOMEBREW_BUMP_TOKEN != '' }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git diff --quiet Formula/mewrite.rb; then
            echo "Formula unchanged — nothing to open a PR for"
            exit 0
          fi
          BRANCH="homebrew-bump-${RELEASE_TAG}"
          git checkout -B "${BRANCH}"
          git add Formula/mewrite.rb
          git commit -m "chore(homebrew): bump formula to ${RELEASE_TAG}"
          git push --force-with-lease origin "${BRANCH}"
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore(homebrew): bump formula to ${RELEASE_TAG}" \
            --body "Automated Homebrew formula bump for ${RELEASE_TAG}." \
            2>/dev/null || echo "PR already exists for ${BRANCH}"
          if [ "${HAS_PAT}" = "true" ]; then
            gh pr merge "${BRANCH}" --auto --squash || \
              echo "auto-merge not enabled; merge the PR manually once checks pass"
          else
            echo "HOMEBREW_BUMP_TOKEN not set: required checks will not run on this PR."
            echo "Merge manually or configure the PAT to enable CI + auto-merge."
          fi

  publish-status:
    runs-on: ubuntu-latest
    needs:
      - build
      - publish-npm
      - publish-docker
      - publish-linux-repos
      - update-homebrew
    if: always()
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      BUILD_STATUS: ${{ needs.build.result }}
      NPM_JOB_STATUS: ${{ needs.publish-npm.result }}
      DOCKER_STATUS: ${{ needs.publish-docker.result }}
      LINUX_REPOS_STATUS: ${{ needs.publish-linux-repos.result }}
      HOMEBREW_STATUS: ${{ needs.update-homebrew.result }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download npm publish status
        uses: actions/download-artifact@v4
        with:
          name: publish-status-npm
          path: publish-status
        continue-on-error: true
      - name: Write publish status summary
        run: |
          npm_status="$NPM_JOB_STATUS"
          npm_note="npm publish job result: $NPM_JOB_STATUS"
          if [ -f publish-status/npm.txt ]; then npm_status="$(cat publish-status/npm.txt)"; fi
          if [ -f publish-status/npm-note.txt ]; then npm_note="$(cat publish-status/npm-note.txt)"; fi
          cat > "publish-status-${RELEASE_TAG}.md" <<EOF
          # Publish status for ${RELEASE_TAG}

          | Channel | Status | Notes |
          | --- | --- | --- |
          | GitHub release binaries | ${BUILD_STATUS} | Release archives, Debian/RPM artifacts, checksums |
          | npm | ${npm_status} | ${npm_note} |
          | Docker / GHCR | ${DOCKER_STATUS} | ghcr.io image tagged ${RELEASE_TAG} and latest |
          | APT/Yum repos | ${LINUX_REPOS_STATUS} | gh-pages apt/ and yum/ repository publish |
          | Homebrew | ${HOMEBREW_STATUS} | Formula/mewrite.rb bump on main |
          | Snap | tracked | snap/snapcraft.yaml metadata only; no Snap store publish in this workflow |
          EOF
          cat "publish-status-${RELEASE_TAG}.md" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload publish status artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-status-${{ env.RELEASE_TAG }}
          path: publish-status-${{ env.RELEASE_TAG }}.md
          retention-days: 90
      - name: Attach publish status to GitHub Release
        run: gh release upload "$RELEASE_TAG" "publish-status-${RELEASE_TAG}.md" --clobber
        continue-on-error: true

  smoke-install:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            triple: linux-x64
          - os: macos-latest
            triple: darwin-arm64
          - os: windows-latest
            triple: windows-x64
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Download mewrite-archives
        uses: actions/download-artifact@v4
        with:
          name: mewrite-archives
          path: archives
      - name: Serve archives locally
        shell: bash
        run: |
          cd archives
          # Bind to 127.0.0.1 (not 0.0.0.0): on macOS runners `localhost`
          # resolves to ::1 first, and python's default IPv4-only bind means
          # curl hangs then fails. Serving and fetching over 127.0.0.1 avoids it.
          python3 -m http.server 8000 --bind 127.0.0.1 >/tmp/http.log 2>&1 &
          echo $! > /tmp/http.pid
          sleep 2
      - name: Run unix installer
        if: matrix.triple != 'windows-x64'
        shell: bash
        env:
          MEWRITE_VERSION: ${{ env.RELEASE_TAG }}
          MEWRITE_BASE_URL: http://127.0.0.1:8000
          MEWRITE_PREFIX: ${{ runner.temp }}/mewrite-smoke
        run: |
          bash install.sh
          "$MEWRITE_PREFIX/bin/mewrite" --version
      - name: Run windows installer
        if: matrix.triple == 'windows-x64'
        shell: pwsh
        env:
          MEWRITE_VERSION: ${{ env.RELEASE_TAG }}
          MEWRITE_BASE_URL: http://127.0.0.1:8000
          MEWRITE_PREFIX: ${{ runner.temp }}\mewrite-smoke
        run: |
          pwsh -File install.ps1
          & "$env:MEWRITE_PREFIX\bin\mewrite.cmd" --version
      - name: Stop http server
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/http.pid ]; then kill "$(cat /tmp/http.pid)" 2>/dev/null || true; fi
