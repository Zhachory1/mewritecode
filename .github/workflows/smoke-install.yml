name: Smoke install

# Builds the host-platform tarball and runs the installer against it for every PR
# that touches the install pipeline. The release workflow has its own smoke job
# (see build-binaries.yml) that runs on tag pushes against the real release artifacts.

on:
  pull_request:
    paths:
      - install.sh
      - install.ps1
      - installers/**
      - Formula/mewrite.rb
      - scripts/build-binaries.sh
      - scripts/build-linux-packages.sh
      - scripts/update-homebrew.sh
      - Dockerfile
      - .github/workflows/build-binaries.yml
      - .github/workflows/smoke-install.yml

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            triple: linux-x64
          - os: macos-latest
            triple: darwin-arm64
          - os: windows-latest
            triple: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run installers/test-install.sh (unit test for the installer script)
        if: matrix.triple != 'windows-x64'
        shell: bash
        run: bash installers/test-install.sh

      - name: Build host tarball
        shell: bash
        run: ./scripts/build-binaries.sh --platform ${{ matrix.triple }}

      - name: Install RPM tooling
        if: matrix.triple == 'linux-x64'
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build Linux packages
        if: matrix.triple == 'linux-x64'
        shell: bash
        run: ./scripts/build-linux-packages.sh smoke packages/coding-agent/binaries

      - name: Validate Linux packages
        if: matrix.triple == 'linux-x64'
        shell: bash
        run: |
          dpkg-deb --info packages/coding-agent/binaries/mewrite-code_smoke_amd64.deb
          if ls packages/coding-agent/binaries/mewrite-code-*.rpm 1>/dev/null 2>&1; then
            rpm -qip packages/coding-agent/binaries/mewrite-code-*.rpm
          else
            echo "Warning: No RPM found for validation"
          fi

      - name: Serve archives locally
        shell: bash
        run: |
          cd packages/coding-agent/binaries
          python3 -m http.server 8000 >/tmp/http.log 2>&1 &
          echo $! > /tmp/http.pid
          sleep 2

      - name: Run unix installer
        if: matrix.triple != 'windows-x64'
        shell: bash
        env:
          MEWRITE_VERSION: smoke
          MEWRITE_BASE_URL: http://localhost:8000
          MEWRITE_PREFIX: ${{ runner.temp }}/mewrite-smoke
        run: |
          bash install.sh
          "$MEWRITE_PREFIX/bin/mewrite" --version

      - name: Run windows installer
        if: matrix.triple == 'windows-x64'
        shell: pwsh
        env:
          MEWRITE_VERSION: smoke
          MEWRITE_BASE_URL: http://localhost:8000
          MEWRITE_PREFIX: ${{ runner.temp }}\mewrite-smoke
        run: |
          pwsh -File install.ps1
          & "$env:MEWRITE_PREFIX\bin\mewrite.cmd" --version

      - name: Stop http server
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/http.pid ]; then kill "$(cat /tmp/http.pid)" 2>/dev/null || true; fi
